<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理器</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex; flex-direction: column;
  user-select: none;
}

/* ========== Header ========== */
.header {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  padding: 0 24px;
  display: flex; align-items: center;
  justify-content: space-between;
  height: 56px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 600; color: #1a1a2e; }
.header-right { display: flex; align-items: center; gap: 12px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 16px; border: none; border-radius: 6px;
  font-size: 13px; cursor: pointer; font-weight: 500;
  transition: all .15s; white-space: nowrap;
}
.btn-primary { background: #4A90D9; color: #fff; }
.btn-primary:hover { background: #3a7bc8; }
.btn-danger { background: #fff; color: #ff4d4f; border: 1px solid #ff4d4f; }
.btn-danger:hover { background: #fff1f0; }
.btn-ghost { background: transparent; color: #666; }
.btn-ghost:hover { background: #f5f5f5; }

/* ========== Nav Tabs ========== */
.nav-tabs {
  display: flex; gap: 0;
  background: #fff; border-bottom: 1px solid #e8e8e8;
  padding: 0 24px;
}
.nav-tab {
  padding: 12px 20px; font-size: 14px; color: #888;
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s; font-weight: 500;
}
.nav-tab:hover { color: #4A90D9; }
.nav-tab.active { color: #4A90D9; border-bottom-color: #4A90D9; }

/* ========== Main Content ========== */
.main { flex: 1; padding: 20px 24px 100px; overflow-y: auto; }
.view { display: none; }
.view.active { display: block; }

/* ========== Kanban (Day View) ========== */
.kanban { display: flex; gap: 16px; height: calc(100vh - 220px); }
.kanban-col {
  flex: 1; background: #f7f8fa; border-radius: 10px;
  display: flex; flex-direction: column;
  min-width: 280px;
}
.kanban-col-header {
  padding: 14px 16px; font-weight: 600; font-size: 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #e8e8e8;
}
.kanban-col-header .count {
  background: #e8e8e8; color: #666; font-size: 12px;
  padding: 1px 8px; border-radius: 10px; font-weight: 500;
}
.kanban-col-body {
  flex: 1; padding: 10px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 100px;
}
.kanban-col-body.drag-over { background: #e6f0ff; border-radius: 8px; }

/* ========== Task Card ========== */
.task-card {
  background: #fff; border-radius: 8px; padding: 12px 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  cursor: grab; transition: box-shadow .15s, transform .15s;
  border-left: 3px solid #d9d9d9;
  position: relative;
}
.task-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.task-card:active { cursor: grabbing; }
.task-card.priority-high { border-left-color: #ff4d4f; }
.task-card.priority-medium { border-left-color: #faad14; }
.task-card.priority-low { border-left-color: #52c41a; }
.task-card.dragging { opacity: .5; transform: scale(.96); }
.task-card-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-card-desc { font-size: 12px; color: #888; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.task-card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #aaa; }
.task-card-actions { position: absolute; top: 8px; right: 8px; display: none; gap: 4px; }
.task-card:hover .task-card-actions { display: flex; }
.task-card-actions button {
  width: 24px; height: 24px; border-radius: 4px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; background: transparent; color: #aaa;
}
.task-card-actions button:hover { background: #f5f5f5; color: #333; }
.task-card-actions button.del:hover { color: #ff4d4f; background: #fff1f0; }

/* ========== Week View ========== */
.week-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 10px; height: calc(100vh - 220px);
}
.week-day {
  background: #f7f8fa; border-radius: 10px; display: flex; flex-direction: column;
}
.week-day.today { box-shadow: 0 0 0 2px #4A90D9; }
.week-day-header {
  padding: 10px 12px; text-align: center; font-size: 12px; color: #888;
  font-weight: 500; border-bottom: 1px solid #e8e8e8;
}
.week-day-header .day-num {
  font-size: 22px; font-weight: 700; color: #1a1a2e; display: block;
}
.week-day-header .day-num.weekend { color: #ff4d4f; }
.week-day.today .week-day-header .day-num { color: #4A90D9; }
.week-day-body {
  flex: 1; padding: 8px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 80px;
}
.week-day-body.drag-over { background: #e6f0ff; border-radius: 8px; }
.week-day .task-card { font-size: 12px; padding: 8px 10px; }
.week-day .task-card-title { font-size: 12px; }

/* ========== Month View ========== */
.month-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.month-header h2 { font-size: 18px; font-weight: 600; }
.month-header .nav-btns { display: flex; gap: 8px; }
.month-calendar {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.month-weekday {
  text-align: center; font-size: 12px; color: #888;
  padding: 8px 0; font-weight: 500;
}
.month-weekday.weekend { color: #ff4d4f; }
.month-day {
  aspect-ratio: 1; border-radius: 8px; padding: 6px;
  background: #fff; cursor: pointer; transition: background .15s;
  border: 1px solid transparent; min-height: 80px;
  display: flex; flex-direction: column;
}
.month-day:hover { background: #f0f5ff; border-color: #d0e0ff; }
.month-day.other-month { opacity: .35; }
.month-day.today { background: #e6f0ff; border-color: #4A90D9; }
.month-day-num { font-size: 13px; font-weight: 500; }
.month-day.today .month-day-num { color: #4A90D9; font-weight: 700; }
.month-day-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
.month-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.month-dot.todo { background: #1890ff; }
.month-dot.progress { background: #faad14; }
.month-dot.done { background: #52c41a; }
.month-day-more { font-size: 10px; color: #888; margin-top: 2px; }

/* ========== Overview ========== */
.overview-header {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  align-items: center;
}
.overview-header input[type="text"] {
  flex: 1; min-width: 200px; padding: 8px 14px; border: 1px solid #d9d9d9;
  border-radius: 6px; font-size: 14px; outline: none;
}
.overview-header input[type="text"]:focus { border-color: #4A90D9; }
.overview-header select {
  padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px;
  font-size: 13px; background: #fff; cursor: pointer; outline: none;
}
.overview-stats {
  display: flex; gap: 16px; margin-bottom: 20px;
}
.stat-card {
  flex: 1; background: #fff; border-radius: 10px; padding: 16px 20px;
  display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.stat-icon {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.stat-icon.total { background: #e6f0ff; }
.stat-icon.progress { background: #fff7e6; }
.stat-icon.done { background: #e6ffe6; }
.stat-val { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 12px; color: #888; }
.overview-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.overview-table th, .overview-table td {
  padding: 10px 16px; text-align: left; font-size: 13px;
}
.overview-table th {
  background: #fafafa; font-weight: 600; color: #666; font-size: 12px;
  text-transform: uppercase; letter-spacing: .5px;
}
.overview-table tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }
.overview-table tr:hover td { background: #fafbfc; }
.status-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 500;
}
.status-badge.todo { background: #e6f0ff; color: #1890ff; }
.status-badge.in_progress { background: #fff7e6; color: #d48806; }
.status-badge.done { background: #e6ffe6; color: #389e0d; }
.priority-tag {
  display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 11px;
}
.priority-tag.high { background: #fff1f0; color: #cf1322; }
.priority-tag.medium { background: #fff7e6; color: #d48806; }
.priority-tag.low { background: #f0f0f0; color: #666; }

/* ========== Modal ========== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: #fff; border-radius: 12px; width: 480px; max-width: 90vw;
  padding: 24px; box-shadow: 0 12px 48px rgba(0,0,0,.15);
}
.modal h3 { font-size: 16px; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9;
  border-radius: 6px; font-size: 14px; outline: none; font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 70px; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: #4A90D9;
}
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

/* ========== Bottom Progress Bar ========== */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 1px solid #e8e8e8;
  padding: 10px 24px; display: flex; align-items: center; gap: 14px;
  z-index: 100; box-shadow: 0 -1px 4px rgba(0,0,0,.04);
}
.progress-wrapper { flex: 1; display: flex; align-items: center; gap: 12px; }
.progress-bar-outer {
  flex: 1; height: 10px; background: #f0f0f0; border-radius: 5px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, #4A90D9, #52c41a);
  transition: width .4s ease;
}
.progress-text { font-size: 13px; font-weight: 600; color: #1a1a2e; white-space: nowrap; }
.progress-detail { font-size: 12px; color: #888; white-space: nowrap; }

/* ========== Empty State ========== */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; color: #ccc;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .text { font-size: 14px; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .kanban { flex-direction: column; height: auto; }
  .week-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 11px; }
  .overview-stats { flex-direction: column; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📋 任务管理器</h1>
  <div class="header-right">
    <button class="btn btn-primary" onclick="openAddModal()">+ 新建任务</button>
  </div>
</div>

<!-- Navigation -->
<div class="nav-tabs" id="navTabs">
  <button class="nav-tab active" data-view="overview">概览</button>
  <button class="nav-tab" data-view="day">日视图（看板）</button>
  <button class="nav-tab" data-view="week">周视图</button>
  <button class="nav-tab" data-view="month">月视图</button>
</div>

<!-- Main Content -->
<div class="main" id="mainContent">
  <!-- Overview View -->
  <div class="view active" id="view-overview">
    <div class="overview-header">
      <input type="text" placeholder="搜索任务..." id="overviewSearch" oninput="renderOverview()">
      <select id="overviewFilter" onchange="renderOverview()">
        <option value="all">全部状态</option>
        <option value="todo">待办</option>
        <option value="in_progress">进行中</option>
        <option value="done">已完成</option>
      </select>
      <select id="overviewPriority" onchange="renderOverview()">
        <option value="all">全部优先级</option>
        <option value="high">高</option>
        <option value="medium">中</option>
        <option value="low">低</option>
      </select>
    </div>
    <div class="overview-stats" id="overviewStats"></div>
    <div id="overviewTableWrap"></div>
  </div>

  <!-- Day Kanban View -->
  <div class="view" id="view-day">
    <div class="kanban" id="kanban">
      <div class="kanban-col" data-status="todo">
        <div class="kanban-col-header">📌 待办 <span class="count">0</span></div>
        <div class="kanban-col-body" id="kanban-todo"></div>
      </div>
      <div class="kanban-col" data-status="in_progress">
        <div class="kanban-col-header">⚡ 进行中 <span class="count">0</span></div>
        <div class="kanban-col-body" id="kanban-in_progress"></div>
      </div>
      <div class="kanban-col" data-status="done">
        <div class="kanban-col-header">✅ 已完成 <span class="count">0</span></div>
        <div class="kanban-col-body" id="kanban-done"></div>
      </div>
    </div>
  </div>

  <!-- Week View -->
  <div class="view" id="view-week">
    <div class="month-header">
      <h2 id="weekTitle"></h2>
      <div class="nav-btns">
        <button class="btn btn-ghost" onclick="navigateWeek(-1)">← 上周</button>
        <button class="btn btn-ghost" onclick="navigateWeek(0)">本周</button>
        <button class="btn btn-ghost" onclick="navigateWeek(1)">下周 →</button>
      </div>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- Month View -->
  <div class="view" id="view-month">
    <div class="month-header">
      <h2 id="monthTitle"></h2>
      <div class="nav-btns">
        <button class="btn btn-ghost" onclick="navigateMonth(-1)">← 上月</button>
        <button class="btn btn-ghost" onclick="navigateMonth(0)">本月</button>
        <button class="btn btn-ghost" onclick="navigateMonth(1)">下月 →</button>
      </div>
    </div>
    <div class="month-calendar" id="monthCalendar"></div>
  </div>
</div>

<!-- Bottom Progress Bar -->
<div class="bottom-bar" id="bottomBar">
  <div class="progress-wrapper">
    <span style="font-size:14px;">📊</span>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <span class="progress-text" id="progressText">0%</span>
    <span class="progress-detail" id="progressDetail"></span>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <h3 id="modalTitle">新建任务</h3>
    <div class="form-group">
      <label>任务标题</label>
      <input type="text" id="taskTitle" placeholder="输入任务标题">
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="taskDesc" placeholder="输入任务描述（可选）"></textarea>
    </div>
    <div class="form-group">
      <label>状态</label>
      <select id="taskStatus">
        <option value="todo">待办</option>
        <option value="in_progress">进行中</option>
        <option value="done">已完成</option>
      </select>
    </div>
    <div class="form-group">
      <label>优先级</label>
      <select id="taskPriority">
        <option value="medium">中</option>
        <option value="high">高</option>
        <option value="low">低</option>
      </select>
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="taskDate">
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" id="btnDeleteTask" style="display:none;" onclick="deleteTask()">删除</button>
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA LAYER ====================
const STORAGE_KEY = 'task-manager-data';
let tasks = [];
let editingId = null;
let currentView = 'overview';

// Week/Month nav state
let weekOffset = 0;  // 0 = this week
let monthOffset = 0; // 0 = this month
// Track which date is selected for day view
let dayViewDate = null;

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
  } catch { tasks = []; }
  if (!tasks.length) seedDemoTasks();
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function seedDemoTasks() {
  const today = new Date();
  const fmt = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const now = new Date();
  tasks = [
    { id: genId(), title: '完成项目需求文档', desc: '整理用户故事和功能规格', status: 'done', date: fmt(addDays(now,-1)), priority: 'high' },
    { id: genId(), title: '设计数据库表结构', desc: '用户表、任务表、标签表', status: 'done', date: fmt(now), priority: 'high' },
    { id: genId(), title: '实现任务 CRUD API', desc: 'RESTful 接口开发', status: 'in_progress', date: fmt(now), priority: 'high' },
    { id: genId(), title: '前端看板页面开发', desc: '拖拽交互、状态流转', status: 'in_progress', date: fmt(addDays(now,1)), priority: 'medium' },
    { id: genId(), title: '编写单元测试', desc: '覆盖核心业务逻辑', status: 'todo', date: fmt(addDays(now,2)), priority: 'medium' },
    { id: genId(), title: '部署到测试环境', desc: '配置 CI/CD 流水线', status: 'todo', date: fmt(addDays(now,3)), priority: 'medium' },
    { id: genId(), title: 'Code Review', desc: '审查团队成员提交的代码', status: 'todo', date: fmt(addDays(now,4)), priority: 'low' },
    { id: genId(), title: '性能优化', desc: '优化首页加载速度，目标 2s 内', status: 'todo', date: fmt(addDays(now,5)), priority: 'low' },
    { id: genId(), title: '用户手册编写', desc: '操作指南和 FAQ', status: 'todo', date: fmt(addDays(now,6)), priority: 'low' },
  ];
  saveTasks();
}

function genId() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

// ==================== RENDER HELPERS ====================
function taskCardHTML(task) {
  const cls = `task-card priority-${task.priority}`;
  return `
    <div class="${cls}" draggable="true" data-id="${task.id}" data-status="${task.status}">
      <div class="task-card-actions">
        <button onclick="event.stopPropagation(); editTask('${task.id}')" title="编辑">✎</button>
        <button class="del" onclick="event.stopPropagation(); confirmDelete('${task.id}')" title="删除">✕</button>
      </div>
      <div class="task-card-title">${esc(task.title)}</div>
      ${task.desc ? `<div class="task-card-desc">${esc(task.desc)}</div>` : ''}
      <div class="task-card-meta">
        ${task.date ? `<span>📅 ${task.date}</span>` : ''}
        <span class="priority-tag ${task.priority}">${priorityLabel(task.priority)}</span>
      </div>
    </div>`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function priorityLabel(p) { return {high:'高',medium:'中',low:'低'}[p] || p; }
function statusLabel(s) { return {todo:'待办',in_progress:'进行中',done:'已完成'}[s] || s; }

// ==================== PROGRESS BAR ====================
function updateProgress() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('progressDetail').textContent =
    total ? `${done}/${total} 已完成` : '暂无任务';
}

// ==================== OVERVIEW ====================
function renderOverview() {
  const search = (document.getElementById('overviewSearch')?.value || '').toLowerCase();
  const filter = document.getElementById('overviewFilter')?.value || 'all';
  const priority = document.getElementById('overviewPriority')?.value || 'all';

  let filtered = tasks;
  if (search) filtered = filtered.filter(t => t.title.toLowerCase().includes(search) || (t.desc||'').toLowerCase().includes(search));
  if (filter !== 'all') filtered = filtered.filter(t => t.status === filter);
  if (priority !== 'all') filtered = filtered.filter(t => t.priority === priority);

  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const inProgress = tasks.filter(t => t.status === 'in_progress').length;
  const todo = tasks.filter(t => t.status === 'todo').length;

  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon total">📋</div>
      <div><div class="stat-val">${total}</div><div class="stat-label">总任务</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon progress">⚡</div>
      <div><div class="stat-val">${inProgress}</div><div class="stat-label">进行中</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon done">✅</div>
      <div><div class="stat-val">${done}</div><div class="stat-label">已完成</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fff1f0;">📌</div>
      <div><div class="stat-val">${todo}</div><div class="stat-label">待办</div></div>
    </div>
  `;

  const wrap = document.getElementById('overviewTableWrap');
  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="text">没有匹配的任务</div></div>`;
    return;
  }

  wrap.innerHTML = `
    <table class="overview-table">
      <thead>
        <tr>
          <th>任务</th>
          <th>状态</th>
          <th>优先级</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(t => `
          <tr>
            <td><strong>${esc(t.title)}</strong>${t.desc ? `<br><small style="color:#888">${esc(t.desc)}</small>` : ''}</td>
            <td><span class="status-badge ${t.status}">${statusLabel(t.status)}</span></td>
            <td><span class="priority-tag ${t.priority}">${priorityLabel(t.priority)}</span></td>
            <td>${t.date || '-'}</td>
            <td>
              <button class="btn btn-ghost" style="padding:2px 8px;font-size:12px;" onclick="editTask('${t.id}')">编辑</button>
              <button class="btn btn-ghost" style="padding:2px 8px;font-size:12px;color:#ff4d4f;" onclick="confirmDelete('${t.id}')">删除</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

// ==================== KANBAN (Day View) ====================
function renderKanban() {
  const dateStr = dayViewDate || todayStr();
  const dayTasks = tasks.filter(t => t.date === dateStr);

  ['todo','in_progress','done'].forEach(status => {
    const el = document.getElementById('kanban-' + status);
    const statusTasks = dayTasks.filter(t => t.status === status);
    el.innerHTML = statusTasks.length
      ? statusTasks.map(taskCardHTML).join('')
      : `<div class="empty-state" style="padding:30px;font-size:12px;"><span style="font-size:24px;">${status==='todo'?'📥':status==='in_progress'?'🔄':'🎉'}</span><div class="text">暂无</div></div>`;
  });

  // Update counts
  document.querySelectorAll('.kanban-col').forEach(col => {
    const s = col.dataset.status;
    const count = dayTasks.filter(t => t.status === s).length;
    col.querySelector('.count').textContent = count;
  });
}

// ==================== WEEK VIEW ====================
function getWeekRange(offset) {
  const now = new Date();
  const day = now.getDay() || 7; // Sunday = 0 -> 7
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function renderWeek() {
  const days = getWeekRange(weekOffset);
  const fmt = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const today = todayStr();

  document.getElementById('weekTitle').textContent =
    `${fmt(days[0])} — ${fmt(days[6])}`;

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = days.map(d => {
    const ds = fmt(d);
    const isToday = ds === today;
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const dayTasks = tasks.filter(t => t.date === ds);
    return `
      <div class="week-day${isToday?' today':''}" data-date="${ds}">
        <div class="week-day-header">
          <span>${['一','二','三','四','五','六','日'][d.getDay()===0?6:d.getDay()-1]}</span>
          <span class="day-num${isWeekend?' weekend':''}">${d.getDate()}</span>
        </div>
        <div class="week-day-body" data-date="${ds}">
          ${dayTasks.length
            ? dayTasks.map(t => `
              <div class="task-card priority-${t.priority}" draggable="true" data-id="${t.id}" data-status="${t.status}" style="padding:6px 8px;font-size:12px;">
                <div class="task-card-title" style="font-size:12px;">${esc(t.title)}</div>
                <div class="task-card-meta">
                  <span class="status-badge ${t.status}" style="font-size:10px;">${statusLabel(t.status)}</span>
                </div>
              </div>`).join('')
            : ''}
        </div>
      </div>`;
  }).join('');

  setupWeekDragDrop();
}

function setupWeekDragDrop() {
  document.querySelectorAll('.week-day-body').forEach(body => {
    body.addEventListener('dragover', e => {
      e.preventDefault();
      body.classList.add('drag-over');
    });
    body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      const date = body.dataset.date;
      const task = tasks.find(t => t.id === taskId);
      if (task && date) { task.date = date; saveTasks(); renderAll(); }
    });
  });
}

// ==================== MONTH VIEW ====================
function renderMonth() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + monthOffset;

  const titleDate = new Date(year, month, 0);
  document.getElementById('monthTitle').textContent =
    `${titleDate.getFullYear()}年 ${titleDate.getMonth()+1}月`;

  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const startDow = firstDay.getDay() || 7; // Mon=1..Sun=7
  const totalDays = lastDay.getDate();

  const today = todayStr();
  const daysInPrevMonth = new Date(year, month - 1, 0).getDate();

  const calendar = document.getElementById('monthCalendar');
  const weekdays = ['一','二','三','四','五','六','日'];

  let html = weekdays.map((w,i) =>
    `<div class="month-weekday${i>=5?' weekend':''}">${w}</div>`
  ).join('');

  // Previous month fillers
  for (let i = startDow - 1; i > 0; i--) {
    const d = daysInPrevMonth - i + 1;
    const pm = month === 1 ? 12 : month - 1;
    const py = month === 1 ? year - 1 : year;
    html += `<div class="month-day other-month"><div class="month-day-num">${d}</div></div>`;
  }

  // Current month
  for (let d = 1; d <= totalDays; d++) {
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === today;
    const dayTasks = tasks.filter(t => t.date === ds);

    const maxDots = 6;
    const dots = dayTasks.slice(0, maxDots);
    const more = dayTasks.length > maxDots ? dayTasks.length - maxDots : 0;

    html += `
      <div class="month-day${isToday?' today':''}" data-date="${ds}" onclick="openDayView('${ds}')">
        <div class="month-day-num">${d}</div>
        <div class="month-day-dots">
          ${dots.map(t => `<span class="month-dot ${t.status}" title="${esc(t.title)}"></span>`).join('')}
        </div>
        ${more ? `<div class="month-day-more">+${more}</div>` : ''}
      </div>`;
  }

  // Next month fillers
  const totalCells = startDow - 1 + totalDays;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="month-day other-month"><div class="month-day-num">${i}</div></div>`;
  }

  calendar.innerHTML = html;
}

// ==================== MODAL ====================
function openAddModal(date) {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新建任务';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskStatus').value = 'todo';
  document.getElementById('taskPriority').value = 'medium';
  document.getElementById('taskDate').value = date || todayStr();
  document.getElementById('btnDeleteTask').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('taskTitle').focus();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑任务';
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDesc').value = task.desc || '';
  document.getElementById('taskStatus').value = task.status;
  document.getElementById('taskPriority').value = task.priority;
  document.getElementById('taskDate').value = task.date || '';
  document.getElementById('btnDeleteTask').style.display = 'inline-flex';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { alert('请输入任务标题'); return; }

  const data = {
    title,
    desc: document.getElementById('taskDesc').value.trim(),
    status: document.getElementById('taskStatus').value,
    priority: document.getElementById('taskPriority').value,
    date: document.getElementById('taskDate').value,
  };

  if (editingId) {
    const idx = tasks.findIndex(t => t.id === editingId);
    if (idx >= 0) tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.push({ id: genId(), ...data });
  }

  saveTasks();
  closeModal();
  renderAll();
}

function confirmDelete(id) {
  if (confirm('确定要删除这个任务吗？')) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    if (editingId === id) closeModal();
    renderAll();
  }
}

function deleteTask() {
  if (editingId) confirmDelete(editingId);
}

// ==================== DRAG & DROP ====================
let draggedTaskId = null;

function setupKanbanDragDrop() {
  document.querySelectorAll('.kanban-col-body').forEach(body => {
    body.addEventListener('dragover', e => {
      e.preventDefault();
      body.classList.add('drag-over');
    });
    body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      const col = body.closest('.kanban-col');
      const newStatus = col ? col.dataset.status : null;
      const task = tasks.find(t => t.id === taskId);
      if (task && newStatus && task.status !== newStatus) {
        task.status = newStatus;
        saveTasks();
        renderAll();
      }
    });
  });
}

document.addEventListener('dragstart', e => {
  const card = e.target.closest('.task-card');
  if (!card) return;
  draggedTaskId = card.dataset.id;
  e.dataTransfer.setData('text/plain', card.dataset.id);
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => card.classList.add('dragging'), 0);
});

document.addEventListener('dragend', e => {
  const card = e.target.closest('.task-card');
  if (card) card.classList.remove('dragging');
  draggedTaskId = null;
});

// ==================== VIEW SWITCHING ====================
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-view="${view}"]`).classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  renderView(view);
}

function openDayView(dateStr) {
  dayViewDate = dateStr;
  switchView('day');
}

function renderView(view) {
  switch (view) {
    case 'overview': renderOverview(); break;
    case 'day': renderKanban(); break;
    case 'week': renderWeek(); break;
    case 'month': renderMonth(); break;
  }
}

function renderAll() {
  updateProgress();
  renderView(currentView);
}

// ==================== WEEK/MONTH NAVIGATION ====================
function navigateWeek(dir) {
  weekOffset = dir === 0 ? 0 : weekOffset + dir;
  renderWeek();
}

function navigateMonth(dir) {
  monthOffset = dir === 0 ? 0 : monthOffset + dir;
  renderMonth();
}

// ==================== HELPERS ====================
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ==================== INIT ====================
document.getElementById('navTabs').addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (!tab) return;
  switchView(tab.dataset.view);
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Initialize kanban drag-drop after each render of kanban
const origRenderKanban = renderKanban;
renderKanban = function() {
  origRenderKanban();
  setupKanbanDragDrop();
};

loadTasks();
renderAll();
</script>
