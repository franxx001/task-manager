<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#4A90D9">
<title>任务管理器</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
/* ========== Reset & Base ========== */
html { font-size: 16px; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh; min-height: 100dvh;
  display: flex;
}
.no-select { user-select: none; }

/* ========== App Layout ========== */
.app-shell { display: flex; width: 100%; min-height: 100vh; }
.app-main { flex: 1; display: flex; flex-direction: column; min-width: 0; transition: margin-left .25s ease; }

/* ========== Sidebar ========== */
.sidebar {
  width: 15rem; min-width: 15rem; background: #fff;
  border-right: 0.0625rem solid #e8e8e8; display: flex; flex-direction: column;
  transition: width .25s ease, min-width .25s ease, opacity .25s ease;
  overflow: hidden; z-index: 110; position: sticky; top: 0; height: 100vh; height: 100dvh;
}
.sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1rem 0.75rem; border-bottom: 0.0625rem solid #f0f0f0;
  height: 3.5rem;
}
.sidebar-logo { font-size: 1rem; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
.sidebar-toggle {
  width: 2rem; height: 2rem; border-radius: 0.375rem; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; background: transparent; color: #888; transition: all .15s;
}
.sidebar-toggle:hover { background: #f0f5ff; color: #4A90D9; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 0.5rem 0; min-height: 0; display: flex; flex-direction: column; }

/* Sidebar Nav Items */
.sidebar-nav { display: flex; flex-direction: column; gap: 0.125rem; padding: 0 0.75rem; }
.sidebar-nav-item {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.625rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem;
  color: #666; cursor: pointer; transition: all .15s; font-weight: 500;
  border: none; background: none; width: 100%; text-align: left;
  white-space: nowrap;
}
.sidebar-nav-item:hover { background: #f0f5ff; color: #4A90D9; }
.sidebar-nav-item.active { background: #e6f0ff; color: #4A90D9; font-weight: 600; }
.sidebar-nav-item .nav-icon { font-size: 1.125rem; width: 1.5rem; text-align: center; flex-shrink: 0; }
.sidebar-nav-item .nav-badge {
  margin-left: auto; background: #e8e8e8; color: #666;
  font-size: 0.6875rem; padding: 0.0625rem 0.5rem; border-radius: 0.625rem; font-weight: 500;
}
.sidebar-nav-item.active .nav-badge { background: #4A90D9; color: #fff; }

/* Sidebar Section (collapsible) */
.sidebar-section { padding: 0.5rem 0.75rem; border-top: 0.0625rem solid #f0f0f0; margin-top: 0.5rem; }
.sidebar-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 0.25rem; cursor: pointer; user-select: none;
  font-size: 0.75rem; font-weight: 600; color: #aaa; text-transform: uppercase;
  letter-spacing: 0.03125rem; border-radius: 0.375rem; transition: background .15s;
}
.sidebar-section-header:hover { background: #fafafa; }
.sidebar-section-arrow {
  font-size: 0.625rem; transition: transform .2s; color: #ccc;
}
.sidebar-section.collapsed .sidebar-section-arrow { transform: rotate(-90deg); }
.sidebar-section-content { padding: 0.25rem 0; overflow: hidden; transition: max-height .3s ease; }
.sidebar-section.collapsed .sidebar-section-content { max-height: 0 !important; padding: 0; }

/* Sidebar Tag Filter */
.sidebar-tag-list { display: flex; flex-direction: column; gap: 0.125rem; max-height: 15rem; overflow-y: auto; }
.sidebar-tag-item {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.375rem 0.5rem; border-radius: 0.375rem; cursor: pointer;
  font-size: 0.8125rem; color: #666; transition: all .1s;
}
.sidebar-tag-item:hover { background: #f0f5ff; }
.sidebar-tag-item.active { background: #e6f0ff; color: #4A90D9; font-weight: 500; }
.sidebar-tag-count { margin-left: auto; font-size: 0.6875rem; color: #bbb; }
.sidebar-tag-item.active .sidebar-tag-count { color: #4A90D9; }
.sidebar-tag-dot {
  width: 0.5rem; height: 0.5rem; border-radius: 50%; flex-shrink: 0;
  background: #4A90D9;
}

/* Sidebar Stats */
.sidebar-stats { padding: 0.75rem; margin-top: 0; }
.sidebar-stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.25rem 0; font-size: 0.75rem; color: #888;
}
.sidebar-stat-row .val { font-weight: 600; color: #1a1a2e; }

/* Floating toggle when sidebar collapsed */
/* Mobile hamburger in header */
.header-hamburger {
  display: none; background: none; border: none; font-size: 1.25rem;
  cursor: pointer; color: #666; padding: 0.25rem; line-height: 1;
}
.header-hamburger:hover { color: #4A90D9; }
/* Show hamburger in header when sidebar collapsed */
.sidebar.collapsed ~ .app-main .header-hamburger { display: inline-block; }

/* Mobile sidebar overlay */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 109;
  display: none; transition: opacity .25s;
}
.sidebar-overlay.show { display: block; }

/* ========== Login Overlay ========== */
.login-overlay {
  position: fixed; inset: 0; background: #f0f2f5; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .3s ease;
}
.login-overlay.hidden { opacity: 0; pointer-events: none; }
.login-card {
  background: #fff; border-radius: 1rem; padding: 2.5rem; width: 25rem;
  max-width: 90vw; box-shadow: 0 0.25rem 1.5rem rgba(0,0,0,.08);
  text-align: center;
}
.login-card h2 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.5rem; }
.login-card p { font-size: 0.875rem; color: #888; margin-bottom: 1.5rem; }
.login-input {
  width: 100%; padding: 0.75rem 1rem; border: 0.125rem solid #e8e8e8;
  border-radius: 0.625rem; font-size: 1rem; outline: none; transition: border-color .2s;
  text-align: center; letter-spacing: 0.125rem;
}
.login-input:focus { border-color: #4A90D9; }
.login-btn {
  width: 100%; padding: 0.75rem; margin-top: 1rem;
  background: #4A90D9; color: #fff; border: none; border-radius: 0.625rem;
  font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s;
}
.login-btn:hover { background: #357ABD; }
.login-btn:disabled { background: #b0c4de; cursor: not-allowed; }
.login-error { color: #e74c3c; font-size: 0.8125rem; margin-top: 0.75rem; min-height: 1.25rem; }
.login-key-display {
  background: #f5f7fa; border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 1.25rem;
  font-size: 0.75rem; color: #666; line-height: 1.6;
}
.login-key-display code {
  display: block; font-size: 0.875rem; color: #4A90D9; font-weight: 600;
  word-break: break-all; margin-top: 0.25rem;
  background: #e6f0ff; padding: 0.5rem 0.75rem; border-radius: 0.375rem;
}

@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 111; }
  .sidebar.collapsed { transform: translateX(-100%); width: 15rem; min-width: 15rem; }
  .header-hamburger { display: inline-block; }
  .app-main { margin-left: 0 !important; }
}

/* ========== Header ========== */
.header { background: #fff; border-bottom: 0.0625rem solid #e8e8e8; padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between; height: 3.5rem;
  box-shadow: 0 0.0625rem 0.25rem rgba(0,0,0,.04); position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.125rem; font-weight: 600; color: #1a1a2e; }
.header-left { display: flex; align-items: center; gap: 0.75rem; }
.header-right { display: flex; align-items: center; gap: 0.75rem; }
.connection-dot {
  width: 0.5rem; height: 0.5rem; border-radius: 50%; display: inline-block;
}
.connection-dot.online { background: #52c41a; box-shadow: 0 0 0.25rem #52c41a; }
.connection-dot.offline { background: #ff4d4f; box-shadow: 0 0 0.25rem #ff4d4f; }
.connection-dot.loading { background: #faad14; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.connection-text { font-size: 0.75rem; color: #888; }
.btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.375rem 1rem; border: none; border-radius: 0.375rem;
  font-size: 0.8125rem; cursor: pointer; font-weight: 500;
  transition: all .15s; white-space: nowrap;
}
.btn-primary { background: #4A90D9; color: #fff; }
.btn-primary:hover { background: #3a7bc8; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-danger { background: #fff; color: #ff4d4f; border: 0.0625rem solid #ff4d4f; }
.btn-danger:hover { background: #fff1f0; }
.btn-ghost { background: transparent; color: #666; }
.btn-ghost:hover { background: #f5f5f5; }
.btn-ghost-tiny {
  background: transparent; border: none; cursor: pointer; color: #888;
  font-size: 0.875rem; padding: 0.25rem 0.5rem; border-radius: 0.25rem; line-height: 1;
  transition: color .15s;
}
.btn-ghost-tiny:hover { color: #ff4d4f; }

/* ========== Nav Tabs ========== */
.nav-tabs {
  display: flex; gap: 0;
  background: #fff; border-bottom: 0.0625rem solid #e8e8e8;
  padding: 0 1.5rem;
}
.nav-tab {
  padding: 0.75rem 1.25rem; font-size: 0.875rem; color: #888;
  border: none; background: none; cursor: pointer;
  border-bottom: 0.125rem solid transparent;
  transition: all .15s; font-weight: 500;
}
.nav-tab:hover { color: #4A90D9; }
.nav-tab.active { color: #4A90D9; border-bottom-color: #4A90D9; }

/* ========== Main Content ========== */
.main { flex: 1; padding: 1.25rem 1.5rem 6.25rem; overflow: hidden; position: relative; }
.view { opacity: 0; pointer-events: none; transition: opacity .15s ease;
  position: absolute; inset: 0; overflow: hidden;
}
.view.active { opacity: 1; pointer-events: all; position: relative; overflow-y: auto; }
.view.abs-hide { position: absolute; }

/* ========== Today View ========== */
.today-header {
  display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
  flex-wrap: wrap;
}
.today-date-title { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; }
.today-date-sub { font-size: 0.8125rem; color: #888; }
.today-actions { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }
.today-progress-ring {
  width: 3.5rem; height: 3.5rem; border-radius: 50%;
  background: conic-gradient(#4A90D9 0deg, #e8e8e8 0deg);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.today-progress-ring::after {
  content: ''; width: 2.75rem; height: 2.75rem; border-radius: 50%;
  background: #fff; position: absolute;
}
.today-progress-inner {
  position: relative; z-index: 1; font-size: 0.8125rem;
  font-weight: 700; color: #1a1a2e; text-align: center; line-height: 1.1;
}
.today-list { display: flex; flex-direction: column; gap: 0.375rem; }
.today-task {
  display: flex; align-items: flex-start; gap: 0.625rem;
  background: #fff; border-radius: 0.5rem; padding: 0.625rem 0.875rem;
  box-shadow: 0 0.0625rem 0.125rem rgba(0,0,0,.04);
  cursor: pointer; transition: box-shadow .15s;
  border-left: 0.1875rem solid #d0e0ff;
}
.today-task:hover { box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,.08); }
.today-task.priority-high { border-left-color: #ff4d4f; }
.today-task.priority-medium { border-left-color: #faad14; }
.today-task.priority-low { border-left-color: #52c41a; }
.today-check {
  width: 1.25rem; height: 1.25rem; border-radius: 50%; margin-top: 0.125rem;
  border: 0.125rem solid #d0d0d0; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-size: 0.6875rem; color: transparent;
}
.today-check:hover { border-color: #4A90D9; }
.today-task.done .today-check {
  background: #52c41a; border-color: #52c41a; color: #fff;
}
.today-task-body { flex: 1; min-width: 0; }
.today-task-title { font-size: 0.875rem; font-weight: 500; color: #1a1a2e; line-height: 1.4; }
.today-task.done .today-task-title { text-decoration: line-through; color: #aaa; }
.today-task-desc { font-size: 0.75rem; color: #888; margin-top: 0.0625rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.today-task-meta { display: flex; align-items: center; gap: 0.375rem; margin-top: 0.1875rem; flex-wrap: wrap; }
.today-task-meta .tag-chip { font-size: 0.625rem; padding: 0.0625rem 0.3125rem; margin: 0; }
.today-task-meta .subtask-note { font-size: 0.6875rem; color: #888; }
.today-subtasks {
  margin-top: 0.25rem; padding-left: 0.5rem;
  border-left: 0.125rem solid #eee;
  display: flex; flex-direction: column; gap: 0.125rem;
}
.today-subtask-item {
  display: flex; align-items: center; gap: 0.375rem;
  cursor: pointer; font-size: 0.75rem; color: #555; padding: 0.0625rem 0;
}
.today-subtask-item input[type="checkbox"] {
  width: 0.75rem; height: 0.75rem; cursor: pointer; flex-shrink: 0;
  accent-color: #52c41a; margin: 0;
}
.today-subtask-item .subtask-card-text {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.today-subtask-item .subtask-card-text.done { text-decoration: line-through; color: #bbb; }
.today-task.done { opacity: .55; border-left-color: #e0e0e0; }
.today-empty {
  text-align: center; padding: 3.75rem 1.25rem; color: #ccc;
}
.today-empty .icon { font-size: 3rem; margin-bottom: 0.75rem; }
.today-empty .text { font-size: 0.875rem; }

/* Drop indicator (shared) */
.drop-indicator {
  height: 0.1875rem; background: #4A90D9; border-radius: 0.125rem;
  margin: 0 0.25rem; transition: all .1s;
  box-shadow: 0 0 0.375rem rgba(74,144,217,.4);
  pointer-events: none;
}
/* Inbox drag indicators */
.inbox-item.drop-before, .today-task.drop-before { border-top: 0.1875rem solid #4A90D9; }
.inbox-item.drop-after, .today-task.drop-after { border-bottom: 0.1875rem solid #4A90D9; }
.today-task.dragging { opacity: .5; transform: scale(.97); }

/* ========== Task Card ========== */
.task-card {
  background: #fff; border-radius: 0.5rem; padding: 0.75rem 0.875rem;
  box-shadow: 0 0.0625rem 0.1875rem rgba(0,0,0,.06);
  cursor: grab; transition: box-shadow .15s, transform .15s;
  border-left: 0.1875rem solid #d9d9d9;
  position: relative;
}
.task-card:hover { box-shadow: 0 0.25rem 0.75rem rgba(0,0,0,.1); }
.task-card:active { cursor: grabbing; }
.task-card.priority-high { border-left-color: #ff4d4f; }
.task-card.priority-medium { border-left-color: #faad14; }
.task-card.priority-low { border-left-color: #52c41a; }
.task-card.dragging, .inbox-item.dragging { opacity: .5; transform: scale(.96); }
/* 标题行：优先级标签+标题+描述同行 */
.task-card-title-line {
  display: flex; align-items: baseline; gap: 0.375rem; margin-bottom: 0.25rem;
  overflow: hidden;
}
.task-card-title-line .priority-tag {
  flex-shrink: 0; font-size: 0.6875rem; padding: 0 0.25rem; border-radius: 0.1875rem;
  font-weight: 700; line-height: 1.5; background: transparent;
}
.task-card-title-line .priority-tag.high { color: #ff4d4f; }
.task-card-title-line .priority-tag.medium { color: #faad14; }
.task-card-title-line .priority-tag.low { color: #52c41a; }
.task-card-title { font-size: 0.875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; max-width: 50%; }
.task-card-desc-inline {
  font-size: 0.8125rem; color: #b0b0b0; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; min-width: 0;
}
/* 子任务列表限制最多4项高度 */
.subtask-card-list { max-height: 4.5rem; overflow: hidden; }
.task-card-meta {
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.375rem;
  font-size: 0.75rem; color: #aaa; margin-top: 0.25rem;
}
.task-card-meta .tag-chip { font-size: 0.6875rem; padding: 0.0625rem 0.375rem; }
.task-card-actions { position: absolute; top: 0.5rem; right: 0.5rem; display: none; gap: 0.25rem; }
.task-card:hover .task-card-actions { display: flex; }
.task-card-actions button {
  width: 1.5rem; height: 1.5rem; border-radius: 0.25rem; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; background: transparent; color: #aaa;
}
.task-card-actions button:hover { background: #f5f5f5; color: #333; }
.task-card-actions button.del:hover { color: #ff4d4f; background: #fff1f0; }

/* ========== Week View ========== */
.week-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 0.625rem; height: calc(100vh - 13.75rem);
}
.week-day {
  background: #f7f8fa; border-radius: 0.625rem; display: flex; flex-direction: column;
}
.week-day.today { box-shadow: 0 0 0 0.125rem #4A90D9; }
.week-day-header {
  padding: 0.625rem 0.75rem; text-align: center; font-size: 0.75rem; color: #888;
  font-weight: 500; border-bottom: 0.0625rem solid #e8e8e8; cursor: pointer;
  transition: background 0.15s;
}
.week-day-header:hover { background: #f0f5ff; }
.week-day-header .day-num {
  font-size: 1.375rem; font-weight: 700; color: #1a1a2e; display: block;
}
.week-day-header .day-num.weekend { color: #ff4d4f; }
.week-day.today .week-day-header .day-num { color: #4A90D9; }
.week-day-body {
  flex: 1; padding: 0.5rem; overflow-y: auto;
  display: flex; flex-direction: column; gap: 0.375rem;
  min-height: 5rem;
}
.week-day-body.drag-over { background: #e6f0ff; border-radius: 0.5rem; }
.week-day .task-card { font-size: 0.75rem; padding: 0.5rem 0.625rem; }
.week-day .task-card-title { font-size: 0.75rem; }

/* ========== Month View ========== */
.month-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.month-header h2 { font-size: 1.125rem; font-weight: 600; white-space: nowrap; }
.month-header .nav-btns { display: flex; gap: 0.5rem; }
.month-calendar {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 0.25rem;
}
.month-weekday {
  text-align: center; font-size: 0.75rem; color: #888;
  padding: 0.5rem 0; font-weight: 500;
}
.month-weekday.weekend { color: #ff4d4f; }
.month-day {
  border-radius: 0.5rem; padding: 0.375rem;
  background: #fff; cursor: pointer; transition: background .15s;
  border: 0.0625rem solid transparent; min-height: 8.125rem;
  display: flex; flex-direction: column; overflow: hidden;
}
.month-day:hover { background: #f0f5ff; border-color: #d0e0ff; }
.month-day.other-month { opacity: .35; }
.month-day.today { background: #e6f0ff; border-color: #4A90D9; }
.month-day-num { font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.125rem; }
.month-day.today .month-day-num { color: #4A90D9; font-weight: 700; }
.month-day-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.125rem; }
.month-task-item { display: flex; align-items: center; gap: 0.25rem; }
.month-task-text { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #666; }
.month-task-text.done { text-decoration: line-through; color: #bbb; }
.month-dot { width: 0.375rem; height: 0.375rem; border-radius: 50%; flex-shrink: 0; }
.month-dot.todo { background: #1890ff; }
.month-dot.progress { background: #faad14; }
.month-dot.done { background: #52c41a; }
.month-day-more { font-size: 0.75rem; color: #4A90D9; margin-top: 0.125rem; cursor: pointer; }

/* ========== Overview ========== */
.overview-header {
  display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap;
  align-items: center;
}
.overview-header input[type="text"] {
  flex: 1; min-width: 12.5rem; padding: 0.5rem 0.875rem; border: 0.0625rem solid #ddd;
  border-radius: 0.5rem; font-size: 0.875rem; outline: none;
}
.overview-header input[type="text"]:focus { border-color: #4A90D9; }
.overview-header select {
  padding: 0.5rem 1.75rem 0.5rem 0.75rem; border: 0.0625rem solid #ccc; border-radius: 0.5rem;
  font-size: 0.8125rem; background: #fff; cursor: pointer; outline: none;
  transition: border-color .15s;
  appearance: none; -webkit-appearance: none;

<script>
// ==================== SUPABASE INIT ====================
const SUPABASE_URL = 'https://bbcwbuutltmodlkldezf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiY3didXV0bHRtb2Rsa2xkZXpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzAzNDAsImV4cCI6MjA5NzI0NjM0MH0.hmXOvHFevOKTFy-_bNV9z8a0Mage9qUOmaFl9-_L9yc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    storage: window.localStorage,
    autoRefreshToken: true,
    detectSessionInUrl: false,
  },
});

// ==================== AUTH ====================
let sessionUser = null;

function isLoggedIn() { return !!sessionUser; }

function getAuthToken() { return localStorage.getItem('task-session') || ''; }

async function keyToEmail(key) {
  const encoder = new TextEncoder();
  const data = encoder.encode(key + ':task-manager-supabase');
  const hash = await crypto.subtle.digest('SHA-256', data);
  const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
  return hex.substring(0, 16) + '@tm.local';
}

async function apiLogin(key) {
  const email = await keyToEmail(key);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: key });
  if (error) throw new Error('密钥错误');
  sessionUser = data.user;
  localStorage.setItem('task-session', '1');
  return data.user;
}

async function apiLogout() {
  await sb.auth.signOut();
  sessionUser = null;
  localStorage.removeItem('task-session');
}

// ==================== SUPABASE DATA LAYER ====================
const TASKS_TABLE = 'tasks';

// Transform Supabase row to app task format (description → desc)
function rowToTask(row) {
  return {
    id: row.id,
    title: row.title,
    desc: row.description || '',
    status: row.status,
    priority: row.priority,
    date: row.date || '',
    tags: row.tags || [],
    subtasks: row.subtasks || [],
    order: row.order || 0,
    recurrence: row.recurrence || null,
    created_at: row.created_at,
    updated_at: row.updated_at,
  };
}

// Transform app task to Supabase row format
function taskToRow(task) {
  const row = {
    title: task.title,
    description: task.desc || '',
    status: task.status || 'todo',
    priority: task.priority || 'medium',
    date: task.date || '',
    tags: task.tags || [],
    subtasks: task.subtasks || [],
    order: task.order || 0,
    recurrence: task.recurrence || null,
  };
  if (task.id) row.id = task.id;
  return row;
}

async function apiGetTasks() {
  const { data, error } = await sb
    .from(TASKS_TABLE)
    .select('*')
    .order('order', { ascending: true });
  if (error) throw new Error(error.message);
  return (data || []).map(rowToTask);
}

async function apiCreateTask(data) {
  const row = taskToRow(data);
  row.id = 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  if (!row.order || row.order === 0) row.order = Date.now() % 2000000000;
  if (sessionUser) row.user_id = sessionUser.id;
  const { data: result, error } = await sb
    .from(TASKS_TABLE)
    .insert(row)
    .select()
    .single();
  if (error) throw new Error(error.message);
  return rowToTask(result);
}

async function apiUpdateTask(id, data) {
  const row = taskToRow(data);
  const { data: result, error } = await sb
    .from(TASKS_TABLE)
    .update(row)
    .eq('id', id)
    .select()
    .single();
  if (error) throw new Error(error.message);
  return rowToTask(result);
}

async function apiPatchTask(id, data) {
  if (!id) throw new Error('任务ID缺失');
  // 过滤掉 undefined 值，避免 Supabase 400
  const clean = {};
  for (const [k, v] of Object.entries(data)) {
    if (v !== undefined) clean[k] = v;
  }
  const { error } = await sb
    .from(TASKS_TABLE)
    .update(clean)
    .eq('id', id);
  if (error) {
    console.error('apiPatchTask error:', error.message, 'details:', error.details, 'hint:', error.hint, 'code:', error.code);
    throw new Error(error.message);
  }
}

async function apiDeleteTask(id) {
  const { error } = await sb
    .from(TASKS_TABLE)
    .delete()
    .eq('id', id);
  if (error) throw new Error(error.message);
}

// ==================== REALTIME SYNC ====================
let realtimeChannel = null;

function setupRealtime() {
  if (realtimeChannel) realtimeChannel.unsubscribe();
  realtimeChannel = sb
    .channel('tasks-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: TASKS_TABLE }, payload => {
      // Reload tasks on any change from server
      if (!document.hidden) loadTasksSilent();
    })
    .subscribe();
}

async function loadTasksSilent() {
  try {
    const loaded = await apiGetTasks();
    tasks = loaded;
    localStorage.setItem('task-manager-cache', JSON.stringify(loaded));
    renderAll();
  } catch {}
}

// ==================== CONNECTION STATUS ====================
function setConnection(status) {
  const dot = document.getElementById('connDot');
  const text = document.getElementById('connText');
  dot.className = 'connection-dot ' + status;
  text.textContent = { online: '已连接', offline: '已断开', loading: '连接中...' }[status];
}

// ==================== GLOBAL STATE ====================
let tasks = [];
let editingId = null;
let currentView = 'overview';
let weekOffset = 0;
let monthOffset = 0;
let dayViewDate = null;

// ==================== TOAST ====================
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==================== DATA OPERATIONS ====================
async function loadTasks() {
  try {
    tasks = await apiGetTasks();
    localStorage.setItem('task-manager-cache', JSON.stringify(tasks));
    setConnection('online');
    hideLogin();
    return true;
  } catch (err) {
    const msg = err.message || '';
    if (msg.includes('permission denied') || msg.includes('403') || msg.includes('JWT')) {
      setConnection('offline');
      console.error('加载失败(RLS权限):', msg);
      showToast('数据库权限不足。请在 Supabase SQL Editor 中依次执行:\n'
        + '① ALTER TABLE tasks ADD COLUMN IF NOT EXISTS user_id UUID;\n'
        + '② ALTER TABLE tasks ENABLE ROW LEVEL SECURITY;\n'
        + '③ CREATE POLICY tasks_owner ON tasks FOR ALL\n'
        + '  USING (auth.uid() = user_id)\n'
        + '  WITH CHECK (auth.uid() = user_id);', 'error');
    } else {
      // 离线：从缓存加载
      const cached = localStorage.getItem('task-manager-cache');
      if (cached) { try { tasks = JSON.parse(cached); } catch {} }

}

async function doSaveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { showToast('请输入任务标题', 'error'); return; }

  const recType = document.getElementById('taskRecurrenceType').value;
  let recurrence = null;
  if (recType) {
    const endType = document.getElementById('taskRecurrenceEnd').value;
    recurrence = { type: recType };
    if (endType === 'count') recurrence.remaining = parseInt(document.getElementById('taskRecurrenceCount').value) || 5;
    if (endType === 'date') recurrence.endDate = document.getElementById('taskRecurrenceDate').value;
  }

  const data = {
    title,
    desc: document.getElementById('taskDesc').value.trim(),
    status: editingId ? (tasks.find(t => t.id === editingId)?.status || 'todo') : 'todo',
    priority: document.querySelector('.priority-btn.active')?.dataset.priority || 'medium',
    date: document.getElementById('taskDate').value,
    tags: currentTags,
    order: editingId ? (tasks.find(t => t.id === editingId)?.order || 0) : 0,
    recurrence,
    subtasks: editingSubtasks.filter(s => s.title.trim()),
  };

  try {
    if (editingId) {
      const updated = await apiUpdateTask(editingId, data);
      const idx = tasks.findIndex(t => t.id === editingId);
      if (idx >= 0) tasks[idx] = updated;
    } else {
      const created = await apiCreateTask(data);
      editingId = created.id;
      tasks.push(created);
    }
    // Auto-complete: all subtasks done → mark parent done
    const validSubs = data.subtasks.filter(s => s.title.trim());
    if (validSubs.length > 0 && validSubs.every(s => s.done) && data.status !== 'done') {
      await apiPatchTask(editingId, { status: 'done' });
      const savedTask = tasks.find(t => t.id === editingId);
      if (savedTask) savedTask.status = 'done';
      // 处理循环任务
      if (savedTask && savedTask.recurrence && savedTask.recurrence.type) {
        const nextTask = createNextRecurrence(savedTask);
        if (nextTask) {
          savedTask.recurrence = null;
          await apiPatchTask(editingId, { recurrence: null });
          const created = await apiCreateTask(nextTask);
          tasks.push(created);
        }
      }
    }
    closeModal();
    renderAll();
    showToast(editingId ? '任务已更新' : '任务已创建', 'success');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function doDeleteTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  try {
    await apiDeleteTask(id);
    const delIdx = tasks.findIndex(t => t.id === id);
    if (delIdx >= 0) tasks.splice(delIdx, 1);
    if (editingId === id) closeModal();
    renderAll();
    // Show undo bar
    const timeout = setTimeout(() => { document.getElementById('undoBar').style.display = 'none'; }, 5000);
    undoState = { id: task.id, title: task.title, desc: task.desc, status: task.status, priority: task.priority, date: task.date, tags: task.tags, timeout };
    document.getElementById('undoText').textContent = `已删除「${task.title}」`;
    document.getElementById('undoBar').style.display = 'flex';
  } catch (err) {
    showToast('删除失败', 'error');
  }
}

let undoState = null;
async function undoDelete() {
  if (!undoState) return;
  clearTimeout(undoState.timeout);
  document.getElementById('undoBar').style.display = 'none';
  try {
    const created = await apiCreateTask({ title: undoState.title, desc: undoState.desc, status: undoState.status, priority: undoState.priority, date: undoState.date, tags: undoState.tags });
    tasks.push(created);
    renderAll();
    showToast('已撤销删除', 'success');
    undoState = null;
  } catch { showToast('撤销失败', 'error'); }
}

function toggleSubtaskInCard(taskId, index) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks || !task.subtasks[index]) return;
  const oldStatus = task.status;
  const oldSubs = task.subtasks.map(s => ({ ...s }));

  // 乐观更新：先改本地
  task.subtasks[index].done = !task.subtasks[index].done;
  const subs = task.subtasks.map(s => ({ ...s }));
  const allDone = subs.length > 0 && subs.every(s => s.done);
  if (allDone !== (oldStatus === 'done')) {
    task.status = allDone ? 'done' : 'todo';
  }
  renderAll();

  // 后台同步（失败时回滚）
  const patchData = { subtasks: subs };
  if (allDone !== (oldStatus === 'done')) {
    patchData.status = allDone ? 'done' : 'todo';
  }
  apiPatchTask(taskId, patchData)
    .then(() => {})
    .catch(e => {
      console.error('乐观同步失败，已回滚:', e);
      task.status = oldStatus;
      task.subtasks = oldSubs;
      showToast('数据同步失败，已回滚', 'error');
      renderAll();
    });
}

// ==================== RECURRENCE HELPERS ====================
function calcNextDate(dateStr, type) {
  const d = new Date(dateStr + 'T00:00:00');
  if (type === 'daily') { d.setDate(d.getDate() + 1); return d; }
  if (type === 'weekdays') {
    do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
    return d;
  }
  if (type === 'weekly') { d.setDate(d.getDate() + 7); return d; }
  return null;
}

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function createNextRecurrence(task) {
  const { type, remaining, endDate } = task.recurrence;
  if (!type) return null;
  if (typeof remaining === 'number' && remaining <= 0) return null;

  const next = calcNextDate(task.date, type);
  if (!next) return null;
  const nextStr = fmtDate(next);
  if (endDate && nextStr > endDate) return null;

  const nextTask = {
    title: task.title,
    desc: task.desc || '',
    status: 'todo',
    priority: task.priority,
    date: nextStr,
    tags: [...(task.tags || [])],
    order: Date.now() % 2000000000,
    recurrence: {
      type,
      remaining: typeof remaining === 'number' ? remaining - 1 : null,
      endDate: endDate || null,
    },
    subtasks: (task.subtasks || []).map(s => ({ ...s, done: false })),
  };
  if (!nextTask.tags.includes('循环')) nextTask.tags.push('循环');
  return nextTask;
}

// ==================== TOGGLE STATUS ====================
function toggleTaskStatus(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const newStatus = task.status === 'done' ? 'todo' : 'done';

  const prevStatus = task.status;
  const subs = task.subtasks;
  const prevSubs = subs ? subs.map(s => ({ ...s })) : null;

  // 乐观更新：先改本地
  task.status = newStatus;
  let patchData = { status: newStatus };
  if (subs && subs.length > 0) {
    const needsUpdate = subs.some(s => s.done !== (newStatus === 'done'));
    if (needsUpdate) {
      subs.forEach(s => s.done = newStatus === 'done');
      patchData.subtasks = subs.map(s => ({ ...s }));
    }
  }

  // 处理循环任务：完成后生成下一个实例
  let nextTask = null;
  if (newStatus === 'done' && task.recurrence && task.recurrence.type) {
    nextTask = createNextRecurrence(task);
    if (nextTask) {
      patchData.recurrence = null; // 移除当前任务的循环标记
      task.recurrence = null;
    }
  }

  renderAll();

  // 后台同步当前任务（失败时回滚）
  apiPatchTask(id, patchData)
    .then(() => {})
    .catch(e => {
      console.error('乐观同步失败，已回滚:', e);
      task.status = prevStatus;
      if (prevSubs && subs) task.subtasks = prevSubs;
      showToast('数据同步失败，已回滚', 'error');
      renderAll();
    });

  // 后台创建下一个循环实例
  if (nextTask) {
    apiCreateTask(nextTask)
      .then(newT => { tasks.push(newT); renderAll(); })
      .catch(e => { console.error('创建循环任务失败:', e); });
  }
}

async function bulkDelete() {

  if (!confirm(`确定要删除 ${selectedIds.size} 个任务吗？此操作不可恢复。`)) return;
  let ok = 0;

  }

  for (const id of selectedIds) {

  selectMode = false;

// ==================== OVERVIEW ====================
function renderOverview() {
  const search = (document.getElementById('overviewSearch')?.value || '').toLowerCase();
  const filter = document.getElementById('overviewFilter')?.value || 'all';
  const priority = document.getElementById('overviewPriority')?.value || 'all';
  const tagFilter = document.getElementById('overviewTag')?.value || 'all';

  // Update tag dropdown
  const tagSelect = document.getElementById('overviewTag');
  const currentVal = tagSelect.value;
  const allTags = getAllTags();
  tagSelect.innerHTML = '<option value="all">标签</option>' + allTags.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  tagSelect.value = allTags.includes(currentVal) ? currentVal : 'all';

  let filtered = tasks;
  // Archive toggle: hide done tasks by default
  const hideDone = document.getElementById('archiveToggle')?.checked;
  if (hideDone && filter !== 'done') filtered = filtered.filter(t => t.status !== 'done');
  if (search) filtered = filtered.filter(t => t.title.toLowerCase().includes(search) || (t.desc||'').toLowerCase().includes(search));
  if (filter !== 'all') filtered = filtered.filter(t => t.status === filter);
  if (priority !== 'all') filtered = filtered.filter(t => t.priority === priority);
  if (tagFilter !== 'all') filtered = filtered.filter(t => (t.tags || []).includes(tagFilter));

  // 排序：日期升序（无日期排最后）→ 优先级降序（high>medium>low）
  const priorityWeight = { high: 3, medium: 2, low: 1 };
  filtered.sort((a, b) => {
    // 无日期排最后
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    // 日期升序
    const dCmp = a.date.localeCompare(b.date);
    if (dCmp !== 0) return dCmp;
    // 优先级降序
    return (priorityWeight[b.priority] || 1) - (priorityWeight[a.priority] || 1);
  });

  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const todo = tasks.filter(t => t.status === 'todo').length;

  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon total">📋</div>
      <div><div class="stat-val">${total}</div><div class="stat-label">总任务</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon done">✅</div>
      <div><div class="stat-val">${done}</div><div class="stat-label">已完成</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fff1f0;">📌</div>
      <div><div class="stat-val">${todo}</div><div class="stat-label">待办</div></div>
    </div>
  `;

  const wrap = document.getElementById('overviewTableWrap');
  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="text">没有匹配的任务</div></div>`;
    return;
  }

  wrap.innerHTML = `
    <table class="overview-table">
      <thead>
        <tr>
          <th style="width:2.5rem;">${selectMode ? '<input type="checkbox" id="selectAllCB" onchange="toggleSelectAll()" style="cursor:pointer;">' : ''}</th>
          <th>任务</th>
          <th>优先级</th>
          <th>标签</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(t => `
          <tr>
            <td>${selectMode ? `<input type="checkbox" class="task-cb" data-id="${t.id}" onchange="onTaskCheck()" ${selectedIds.has(t.id)?'checked':''} style="cursor:pointer;">` : `<span class="cb-circle${t.status==='done'?' checked':''}" onclick="event.stopPropagation();toggleTaskStatus('${t.id}')" title="${t.status==='done'?'标记为待办':'标记为完成'}"></span>`}</td>
            <td><span class="${t.status==='done'?'task-done':''}"><strong>${esc(t.title)}</strong>${subtaskProgress(t) ? `<span class="overview-subtask">(${subtaskProgress(t).done}/${subtaskProgress(t).total})</span>` : ''}${t.desc ? `<span class="overview-desc">${esc(t.desc)}</span>` : ''}</span></td>
            <td><span class="priority-tag ${t.priority}">${priorityLabel(t.priority)}</span></td>
            <td>${tagChipsHTML(t.tags || [])}</td>
            <td>${t.date || '-'}</td>
            <td>
              <button class="btn btn-ghost" style="padding:0.125rem 0.5rem;font-size:0.75rem;" onclick="editTask('${t.id}')">编辑</button>
              <button class="btn btn-ghost" style="padding:0.125rem 0.5rem;font-size:0.75rem;color:#ff4d4f;" onclick="doDeleteTask('${t.id}')">删除</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function inboxQuickAdd() {

  apiCreateTask({
    title,
    desc: '',
    status: 'todo',
    priority: 'medium',
    date: '',
    tags: []
  }).then(created => {
    input.value = '';
    tasks.push(created);
    renderAll();
    showToast('已添加到收件箱', 'success');

function toggleInboxArchive() {
  const cb = document.getElementById('inboxArchiveToggle');
  cb.checked = !cb.checked;
  document.getElementById('inboxArchiveLabel').classList.toggle('off', !cb.checked);
  localStorage.setItem('task-inbox-archive', cb.checked ? '1' : '0');

function assignInboxDate(id, e) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  const btn = e.currentTarget || e.target;
  const rect = btn.getBoundingClientRect();
  dateInput.style.cssText = `position:fixed;z-index:999;top:${rect.bottom + 2}px;left:${rect.left}px;opacity:0;pointer-events:none;`;
  document.body.appendChild(dateInput);
  requestAnimationFrame(() => {
    dateInput.showPicker ? dateInput.showPicker() : dateInput.click();
  });
  dateInput.addEventListener('change', async () => {
    if (dateInput.value) {
      try {
        await apiPatchTask(id, { date: dateInput.value });
        const t = tasks.find(t2 => t2.id === id);
        if (t) t.date = dateInput.value;
        renderAll();
        showToast(`已排期至 ${dateInput.value}`, 'success');
      } catch (e) { showToast('排期失败', 'error'); }
    }
    document.body.removeChild(dateInput);
  });
  dateInput.addEventListener('blur', () => {
    setTimeout(() => { if (document.body.contains(dateInput)) document.body.removeChild(dateInput); }, 300);
  });
}

// ==================== TODAY VIEW ====================
function renderKanban() {
  const dateStr = dayViewDate || todayStr();
  const isToday = dateStr === todayStr();

  // Header
  const d = new Date(dateStr + 'T00:00:00');
  const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('todayDateTitle').textContent = isToday ? '今天' : `${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('todayDateSub').textContent = isToday
    ? `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${weekNames[d.getDay()]}`
    : `${d.getFullYear()}年 ${weekNames[d.getDay()]}`;

  // Show/hide "回到今天" button
  document.getElementById('btnGoToday').style.display = isToday ? 'none' : '';

  const dayTasks = tasks.filter(t => t.date === dateStr);
  const total = dayTasks.length;
  const done = dayTasks.filter(t => t.status === 'done').length;
  const todo = total - done;

  // Progress ring
  const pct = total ? Math.round((done / total) * 100) : 0;
  const ring = document.getElementById('todayProgressRing');
  ring.style.background = `conic-gradient(#52c41a ${pct * 3.6}deg, #e8e8e8 0deg)`;
  document.getElementById('todayProgressInner').textContent = `${done}/${total}`;

  // Task list: todo first, then done
  const sorted = [...dayTasks].sort((a, b) => {
    if (a.status === 'done' && b.status !== 'done') return 1;
    if (a.status !== 'done' && b.status === 'done') return -1;
    return (a.order || 0) - (b.order || 0);
  });

  const list = document.getElementById('todayList');
  if (!sorted.length) {
    list.innerHTML = `<div class="today-empty"><div class="icon">☀️</div><div class="text">今天还没有任务，点击「+ 添加」开始</div></div>`;
  } else {
    list.innerHTML = sorted.map(t => `
      <div class="today-task priority-${t.priority}${t.status === 'done' ? ' done' : ''}" draggable="true" data-id="${t.id}">
        <div class="today-check" onclick="event.stopPropagation(); toggleTaskStatus('${t.id}')">✓</div>
        <div class="today-task-body" onclick="editTask('${t.id}')">
          <div class="today-task-title">${esc(t.title)}</div>
          ${t.desc ? `<div class="today-task-desc">${esc(t.desc)}</div>` : ''}
          ${(t.tags && t.tags.length) || (t.subtasks && t.subtasks.length) ? `
          <div class="today-task-meta">
            ${tagChipsHTML(t.tags || [])}
          </div>` : ''}
          ${todaySubtasksHTML(t)}
        </div>
      </div>`).join('');
  }

  setupTodayDragDrop();
}

function todaySubtasksHTML(task) {
  const subs = task.subtasks || [];
  if (!subs.length) return '';
  return `<div class="today-subtasks" onclick="event.stopPropagation()">
    ${subs.map((s, i) => `
      <label class="today-subtask-item">
        <input type="checkbox" ${s.done ? 'checked' : ''} onchange="event.stopPropagation();toggleSubtaskInCard('${task.id}', ${i})">
        <span class="${s.done ? 'subtask-card-text done' : 'subtask-card-text'}">${esc(s.title)}</span>
      </label>
    `).join('')}
  </div>`;
}

function setupTodayDragDrop() {
  const list = document.getElementById('todayList');
  if (!list || list._tdSetup) return;
  list._tdSetup = true;

  list.addEventListener('dragover', e => {
    e.preventDefault();
    const taskEl = e.target.closest('.today-task');
    if (!taskEl || taskEl.dataset.id === draggedTaskId) return;
    const rect = taskEl.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (e.clientY < mid) {
      taskEl.classList.add('drop-before');
      taskEl.classList.remove('drop-after');
    } else {
      taskEl.classList.add('drop-after');
      taskEl.classList.remove('drop-before');
    }
  });

  list.addEventListener('dragleave', e => {
    const taskEl = e.target.closest('.today-task');
    if (taskEl) { taskEl.classList.remove('drop-before', 'drop-after'); }
  });

  list.addEventListener('drop', async e => {
    e.preventDefault();
    list.querySelectorAll('.today-task').forEach(el => el.classList.remove('drop-before', 'drop-after'));

    const targetEl = e.target.closest('.today-task');
    const taskId = draggedTaskId;
    if (!taskId || !targetEl || targetEl.dataset.id === taskId) return;

    const targetTask = tasks.find(t => t.id === targetEl.dataset.id);
    const dragTask = tasks.find(t => t.id === taskId);
    if (!targetTask || !dragTask) return;

    const rect = targetEl.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;

    // Reorder in today's date tasks
    const dateStr = dayViewDate || todayStr();
    const dateTasks = tasks.filter(t => t.date === dateStr).sort((a, b) => (a.order || 0) - (b.order || 0));
    const targetIdx = dateTasks.findIndex(t => t.id === targetTask.id);
    const newIdx = before ? targetIdx : targetIdx + 1;

    // Calculate new order
    const prevOrder = newIdx > 0 ? dateTasks[newIdx - 1].order || 0 : 0;
    const nextOrder = newIdx < dateTasks.length ? dateTasks[newIdx].order || (prevOrder + 1) : prevOrder + 1;
    const newOrder = (prevOrder + nextOrder) / 2;

    dragTask.order = newOrder;
    renderAll();
    apiPatchTask(taskId, { order: newOrder }).catch(() => {});
  });

  // Clear indicators when leaving
  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      list.querySelectorAll('.today-task').forEach(el => el.classList.remove('drop-before', 'drop-after'));
    }
  });
}

// ==================== WEEK VIEW ====================
function getWeekRange(offset) {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function renderWeek() {
  const days = getWeekRange(weekOffset);
  const fmt = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const fmtShort = d => {
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${m}-${day}`;
  };
  const today = todayStr();

  document.getElementById('weekTitle').textContent =
    `${fmtShort(days[0])} — ${fmtShort(days[6])}`;

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = days.map(d => {
    const ds = fmt(d);
    const isToday = ds === today;
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const dayTasks = tasks.filter(t => t.date === ds);
    return `
      <div class="week-day${isToday?' today':''}" data-date="${ds}">
        <div class="week-day-header" onclick="openDayView('${ds}')" title="点击查看当日看板">
          <span>${['一','二','三','四','五','六','日'][d.getDay()===0?6:d.getDay()-1]}</span>
          <span class="day-num${isWeekend?' weekend':''}">${d.getDate()}</span>
        </div>
        <div class="week-day-body" data-date="${ds}">
          ${dayTasks.length
            ? dayTasks.map(t => `
              <div class="task-card priority-${t.priority}" draggable="true" data-id="${t.id}" data-status="${t.status}" style="padding:0.375rem 0.5rem;font-size:0.75rem;">
                <div class="task-card-title" style="font-size:0.75rem;${t.status==='done'?'text-decoration:line-through;color:#aaa;':''}">${esc(t.title)}</div>
              </div>`).join('')
            : ''}
        </div>
      </div>`;
  }).join('');

  setupWeekDragDrop();
}

function setupWeekDragDrop() {
  document.querySelectorAll('.week-day-body').forEach(body => {
    body.addEventListener('dragover', e => {
      e.preventDefault();
      body.classList.add('drag-over');
    });
    body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
    body.addEventListener('drop', async e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      const date = body.dataset.date;
      const task = tasks.find(t => t.id === taskId);
      if (task && date && task.date !== date) {
        try {
          await apiPatchTask(taskId, { date });
          task.date = date;
          renderAll();
        } catch { showToast('操作失败', 'error'); }
      }
    });
  });
}

// ==================== MONTH VIEW ====================
function renderMonth() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + monthOffset;

  const titleDate = new Date(year, month, 1);
  document.getElementById('monthTitle').textContent =
    `${titleDate.getFullYear()}年 ${titleDate.getMonth()+1}月`;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay() || 7;
  const totalDays = lastDay.getDate();

  const today = todayStr();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  const calendar = document.getElementById('monthCalendar');
  const weekdays = ['一','二','三','四','五','六','日'];

  let html = weekdays.map((w,i) =>
    `<div class="month-weekday${i>=5?' weekend':''}">${w}</div>`
  ).join('');

  for (let i = startDow - 1; i > 0; i--) {
    const d = daysInPrevMonth - i + 1;
    html += `<div class="month-day other-month"><div class="month-day-num">${d}</div></div>`;
  }

  for (let d = 1; d <= totalDays; d++) {
    const ds = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === today;
    const dayTasks = tasks.filter(t => t.date === ds);

    const maxItems = window.innerWidth < 500 ? 2 : 5;
    const items = dayTasks.slice(0, maxItems);
    const more = dayTasks.length > maxItems ? dayTasks.length - maxItems : 0;

    html += `
      <div class="month-day${isToday?' today':''}" data-date="${ds}" onclick="openDayView('${ds}')">
        <div class="month-day-num">${d}</div>
        <div class="month-day-items">
          ${items.map(t => `
            <div class="month-task-item">
              <span class="month-dot ${t.status}"></span>
              <span class="month-task-text${t.status === 'done' ? ' done' : ''}" title="${esc(t.title)}${subtaskProgress(t) ? ` (${subtaskProgress(t).done}/${subtaskProgress(t).total})` : ''}">${esc(t.title)}${subtaskProgress(t) ? ` (${subtaskProgress(t).done}/${subtaskProgress(t).total})` : ''}</span>
            </div>`).join('')}
        </div>
        ${more ? `<div class="month-day-more"><a>+${more} more</a></div>` : ''}
      </div>`;
  }

  const totalCells = startDow - 1 + totalDays;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="month-day other-month"><div class="month-day-num">${i}</div></div>`;
  }

  calendar.innerHTML = html;
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑任务';
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDesc').value = task.desc || '';
  document.getElementById('taskDate').value = task.date || '';
  document.getElementById('btnDeleteTask').style.display = 'inline-flex';
  // Set priority buttons
  document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
  const priorityBtn = document.querySelector(`.priority-btn[data-priority="${task.priority || 'medium'}"]`);
  if (priorityBtn) priorityBtn.classList.add('active');
  initTagInput(task.tags || []);
  // Set recurrence
  const rec = task.recurrence;
  if (rec && rec.type) {
    document.getElementById('taskRecurrenceType').value = rec.type;
    document.getElementById('recurrenceOptions').style.display = 'block';
    if (rec.remaining !== null && rec.remaining !== undefined) {
      document.getElementById('taskRecurrenceEnd').value = 'count';
      document.getElementById('taskRecurrenceCount').value = rec.remaining;
      document.getElementById('taskRecurrenceCount').style.display = 'inline-block';
      document.getElementById('taskRecurrenceDate').style.display = 'none';
    } else if (rec.endDate) {
      document.getElementById('taskRecurrenceEnd').value = 'date';
      document.getElementById('taskRecurrenceDate').value = rec.endDate;
      document.getElementById('taskRecurrenceDate').style.display = 'inline-block';
      document.getElementById('taskRecurrenceCount').style.display = 'none';
    } else {
      document.getElementById('taskRecurrenceEnd').value = 'none';
      document.getElementById('taskRecurrenceCount').style.display = 'none';
      document.getElementById('taskRecurrenceDate').style.display = 'none';
    }
  } else {
    document.getElementById('taskRecurrenceType').value = '';
    document.getElementById('recurrenceOptions').style.display = 'none';
  }
  // Load subtasks
  editingSubtasks = (task.subtasks || []).map(s => ({ ...s }));
  renderSubtaskList();
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}

function setPriority(val) {
  document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.priority-btn[data-priority="${val}"]`).classList.add('active');
}

function saveTask() { doSaveTask(); }
function deleteCurrentTask() { if (editingId) doDeleteTask(editingId); }

// ==================== DRAG & DROP (shared) ====================
let draggedTaskId = null;   // set in dragstart, cleared in dragend

// ==================== INBOX DRAG SORT ====================
function setupInboxDragDrop() {
  const list = document.getElementById('inboxList');
  if (!list || list._ddInbox) return;
  list._ddInbox = true;

  list.addEventListener('dragover', e => {
    e.preventDefault();
    const item = e.target.closest('.inbox-item');
    if (!item || !draggedTaskId) return;
    // Show indicator
    clearInboxIndicator();
    const rect = item.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (e.clientY < mid) {
      item.classList.add('drop-before');
    } else {
      item.classList.add('drop-after');
    }
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) clearInboxIndicator();
  });

  list.addEventListener('drop', async e => {
    e.preventDefault();
    clearInboxIndicator();
    const targetItem = e.target.closest('.inbox-item');
    if (!targetItem || !draggedTaskId) return;
    const taskId = draggedTaskId;
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;

    const rect = targetItem.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const targetId = targetItem.dataset.id;
    const targetTask = tasks.find(t => t.id === targetId);
    if (!targetTask) return;

    // 纯 midpoint 算法，float8 精度永不重平衡
    const insertBefore = e.clientY < mid;
    const items = [...list.querySelectorAll('.inbox-item')];
    const targetIdx = items.findIndex(it => it.dataset.id === targetId);
    let prevOrder, nextOrder;

    if (insertBefore) {
      prevOrder = targetIdx > 0 ? (tasks.find(t => t.id === items[targetIdx-1].dataset.id)?.order || 0) : 0;
      nextOrder = targetTask.order || 0;
    } else {
      prevOrder = targetTask.order || 0;
      nextOrder = targetIdx < items.length - 1 ? (tasks.find(t => t.id === items[targetIdx+1].dataset.id)?.order || 0) : (prevOrder + 1000000);
    }

    const newOrder = (prevOrder + nextOrder) / 2;

    // Optimistic update
    task.order = newOrder;
    renderAll();

    // Async sync
    apiPatchTask(taskId, { order: newOrder })
      .then(() => {})
      .catch(e => { console.error('inbox排序同步失败:', e); });
  });
}

function clearInboxIndicator() {
  document.querySelectorAll('#inboxList .inbox-item').forEach(el => {
    el.classList.remove('drop-before', 'drop-after');
  });
}

document.addEventListener('dragstart', e => {
  const card = e.target.closest('.task-card, .today-task');
  if (card) {
    draggedTaskId = card.dataset.id;
    e.dataTransfer.setData('text/plain', card.dataset.id);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
    return;
  }
  // Inbox drag
  const item = e.target.closest('.inbox-item');
  if (item) {
    draggedTaskId = item.dataset.id;
    e.dataTransfer.setData('text/plain', item.dataset.id);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => item.classList.add('dragging'), 0);
  }
});

document.addEventListener('dragend', () => {
  draggedTaskId = null;
  document.querySelectorAll('.dragging, .drop-before, .drop-after, .drop-indicator').forEach(el => {
    el.classList.remove('dragging', 'drop-before', 'drop-after');
    if (el.classList.contains('drop-indicator')) el.remove();
  });
});

// ==================== SIDEBAR ====================
let sidebarCollapsed = false;
let sidebarTagFilter = 'all';
let sidebarMobileOpen = false;

function toggleSidebar() {
  // Mobile: sidebar-toggle button closes sidebar
  if (window.innerWidth <= 768 && !sidebarCollapsed) {
    closeMobileSidebar();
    return;
  }
  const sidebar = document.getElementById('sidebar');
  sidebarCollapsed = !sidebarCollapsed;
  sidebar.classList.toggle('collapsed', sidebarCollapsed);
  // Update toggle button icon
  const toggle = sidebar.querySelector('.sidebar-toggle');
  toggle.textContent = '☰';
  // Sync bottom bar
  const bottomBar = document.getElementById('bottomBar');
  if (bottomBar) bottomBar.style.left = sidebarCollapsed ? '0' : '15rem';
  // Save preference
  localStorage.setItem('task-sidebar-collapsed', sidebarCollapsed ? '1' : '0');
}

function closeMobileSidebar() {
  if (window.innerWidth > 768) return;
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.add('collapsed');
  document.getElementById('sidebarOverlay').classList.remove('show');
  sidebarCollapsed = true;
  localStorage.setItem('task-sidebar-collapsed', '1');
  const bb = document.getElementById('bottomBar');
  if (bb) bb.style.left = '0';
}

function toggleSidebarSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
  // Save state
  const collapsed = document.getElementById(id).classList.contains('collapsed');
  localStorage.setItem('task-section-' + id, collapsed ? '1' : '0');
}

function selectSidebarTag(tag) {
  sidebarTagFilter = tag;
  renderSidebarTags();
  // Apply tag filter to current view
  if (currentView === 'overview') {
    document.getElementById('overviewTag').value = tag;
    renderOverview();
  }
}

function renderSidebarTags() {
  const allTags = getAllTags();
  const list = document.getElementById('sidebarTagList');
  if (!allTags.length) {
    list.innerHTML = '<div style="font-size:0.75rem;color:#ccc;padding:0.25rem 0.5rem;">暂无标签</div>';
    return;
  }
  list.innerHTML = allTags.map(tag => {
    const count = tasks.filter(t => (t.tags || []).includes(tag)).length;
    const active = sidebarTagFilter === tag ? ' active' : '';
    return `
      <div class="sidebar-tag-item${active}" onclick="selectSidebarTag('${sidebarTagFilter === tag ? 'all' : esc(tag)}')">
        <span class="sidebar-tag-dot"></span>
        <span>${esc(tag)}</span>
        <span class="sidebar-tag-count">${count}</span>
      </div>`;
  }).join('');
}

function updateSidebarStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const inProgress = tasks.filter(t => t.status === 'todo').length;
  const inboxCount = tasks.filter(t => !t.date).length;
  document.getElementById('sidebarStatTotal').textContent = total;
  document.getElementById('sidebarStatDone').textContent = done;
  document.getElementById('sidebarStatProgress').textContent = inProgress;
  document.getElementById('navBadgeTotal').textContent = total;
  document.getElementById('navBadgeInbox').textContent = inboxCount || '0';
  document.getElementById('navBadgeArchive').textContent = tasks.filter(t => t.status === 'done').length || '0';
}

// ==================== VIEW SWITCHING ====================
function switchView(view) {
  currentView = view;
  // Update sidebar nav
  document.querySelectorAll('.sidebar-nav-item').forEach(item => item.classList.remove('active'));
  const sideItem = document.querySelector(`.sidebar-nav-item[data-view="${view}"]`);
  if (sideItem) sideItem.classList.add('active');
  // Show tag filter only on overview page
  const tagSection = document.getElementById('sidebarTagSection');
  tagSection.style.display = view === 'overview' ? '' : 'none';
  // Update view visibility
  document.querySelectorAll('.view').forEach(v => {
    v.classList.add('abs-hide');
    v.classList.remove('active');
  });
  const target = document.getElementById('view-' + view);
  target.classList.remove('abs-hide');
  void target.offsetWidth;
  target.classList.add('active');
  renderView(view);
}

function openDayView(dateStr) {
  dayViewDate = dateStr;
  switchView('day');
}

function goToday() {
  dayViewDate = null;
  switchView('day');
}

function renderView(view) {
  switch (view) {
    case 'overview': renderOverview(); break;
    case 'day': renderKanban(); break;
    case 'week': renderWeek(); break;
    case 'month': renderMonth(); break;
    case 'inbox': renderInbox(); break;
    case 'archive': renderArchive(); break;
  }
}

function renderAll() {
  updateProgress();
  updateSidebarStats();
  renderSidebarTags();
  renderView(currentView);
}

// ==================== WEEK/MONTH NAVIGATION ====================
function navigateWeek(dir) {
  weekOffset = dir === 0 ? 0 : weekOffset + dir;
  renderWeek();
}

function navigateMonth(dir) {
  monthOffset = dir === 0 ? 0 : monthOffset + dir;
  renderMonth();
}

// ==================== HELPERS ====================
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

document.getElementById('sidebarNav').addEventListener('click', e => {
  const item = e.target.closest('.sidebar-nav-item');
  if (!item) return;
  switchView(item.dataset.view);
  // On mobile, close sidebar after nav
  if (window.innerWidth <= 768) closeMobileSidebar();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('show')) {
      closeModal();
    } else {
      hideSuggestions();
    }
  }
});

// Tag input events
document.getElementById('tagInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addTagFromInput(); }
  if (e.key === 'Backspace' && e.target.value === '' && currentTags.length > 0) {
    currentTags.pop(); renderTagChips();
  }
});
document.getElementById('tagInput').addEventListener('input', e => {
  showSuggestions(e.target.value);
});
document.getElementById('tagInput').addEventListener('blur', () => {
  setTimeout(hideSuggestions, 150);
});

// Close suggestions on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.tag-form-group')) hideSuggestions();
});

// Startup

// ==================== DEBOUNCE ====================
function debounce(fn, delay = 300) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}
const debouncedRenderOverview = debounce(renderOverview);
const debouncedRenderInbox = debounce(renderInbox);
const debouncedRenderArchive = debounce(renderArchive);

// Startup
(async function init() {
  // Sidebar: auto-collapse on mobile only; desktop always starts visible
  if (window.innerWidth <= 768) {
    sidebarCollapsed = true;
    document.getElementById('sidebar').classList.add('collapsed');
    document.querySelector('.sidebar-toggle').textContent = '☰';
  }
  // Sync bottom bar with sidebar state
  const bb = document.getElementById('bottomBar');
  if (bb) bb.style.left = sidebarCollapsed ? '0' : '15rem';
  // Restore collapsible section states
  ['sidebarTagSection'].forEach(id => {
    if (localStorage.getItem('task-section-' + id) === '1') {
      document.getElementById(id).classList.add('collapsed');
    }
  });
  // Header hamburger: open sidebar on mobile
  const hamburger = document.getElementById('headerHamburger');
  hamburger.addEventListener('click', () => {
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('collapsed');
      document.getElementById('sidebarOverlay').classList.add('show');
      sidebarCollapsed = false;
      localStorage.setItem('task-sidebar-collapsed', '0');
      const bb = document.getElementById('bottomBar');
      if (bb) bb.style.left = '0';
    } else {
      toggleSidebar();
    }
  });

  // Init archive label state
  const archiveCb = document.getElementById('archiveToggle');
  if (archiveCb && !archiveCb.checked) document.getElementById('archiveLabel').classList.add('off');

  // Init inbox archive state
  const inboxArcCb = document.getElementById('inboxArchiveToggle');
  if (inboxArcCb) {
    const inboxArcState = localStorage.getItem('task-inbox-archive');
    if (inboxArcState === '1') {
      inboxArcCb.checked = true;
    } else {
      document.getElementById('inboxArchiveLabel').classList.add('off');
    }
  }

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Check existing auth session
  console.log('init: checking session');
  let session = null;
  try {
    const result = await sb.auth.getSession();
    session = result.data?.session || null;
    console.log('init: session result', session ? 'has session' : 'no session');
  } catch (e) {
    console.error('init: getSession error', e);
  }
  // No existing session — show login
  if (!session) {
    setConnection('offline');
    showLogin();
    renderAll();
    return;
  }

  // Has session — load data
  sessionUser = session.user;
  hideLogin();
  setConnection('loading');
  const ok = await loadTasks();
  if (ok) setupRealtime();
  renderAll();
})();

// Auto-refresh when tab becomes visible
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isLoggedIn()) loadTasksSilent();
});
</script>
