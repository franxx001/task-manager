<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="description" content="任务管理器 — 月视图、周视图、日常看板、拖拽排序、标签筛选与进度统计">
<meta name="theme-color" content="#2E6EB5">
<title>任务管理器</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"
  onerror="console.warn('[task-manager] Supabase CDN 加载失败，将使用离线模式')"></script>
</head>
<body>

<!-- App Shell: Sidebar + Main -->
<!-- Login Overlay -->
<div class="login-overlay hidden" id="loginOverlay">
  <div class="login-card">
    <h2>🔑 任务管理器</h2>
    <p>请输入密钥以继续</p>
    <div class="login-key-display" id="loginKeyHelp" style="display:none;">
      密钥保存在服务器 <code>data/auth.json</code> 文件中<br>
      首次启动时已打印在控制台
    </div>
    <input class="login-input" id="loginKeyInput" type="password" placeholder="输入登录密钥" autofocus>
    <button class="login-btn" id="loginBtn">登录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="app-shell">

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-logo">📋 任务管理器</span>
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="折叠侧边栏">☰</button>
  </div>
  <div class="sidebar-body">
    <!-- Nav Items -->
    <div class="sidebar-nav" id="sidebarNav">
      <button class="sidebar-nav-item active" data-view="overview">
        <span class="nav-icon">📊</span> 概览
        <span class="nav-badge" id="navBadgeTotal">0</span>
      </button>
      <button class="sidebar-nav-item" data-view="day">
        <span class="nav-icon">☀️</span> 今天
      </button>
      <button class="sidebar-nav-item" data-view="week">
        <span class="nav-icon">📅</span> 周视图
      </button>
      <button class="sidebar-nav-item" data-view="month">
        <span class="nav-icon">📋</span> 月视图
      </button>
      <button class="sidebar-nav-item" data-view="inbox">
        <span class="nav-icon">📥</span> 收件箱
        <span class="nav-badge" id="navBadgeInbox">0</span>
      </button>
    </div>

    <!-- Tag Filter Section (Collapsible) -->
    <div class="sidebar-section" id="sidebarTagSection">
      <div class="sidebar-section-header" onclick="toggleSidebarSection('sidebarTagSection')">
        <span>🏷️ 标签筛选</span>
        <span class="sidebar-section-arrow">▼</span>
      </div>
      <div class="sidebar-section-content">
        <div class="sidebar-tag-list" id="sidebarTagList"></div>
      </div>
    </div>
    <div style="margin-top:auto;border-top:0.0625rem solid #f0f0f0;padding-bottom:env(safe-area-inset-bottom, 0);">
      <div class="sidebar-stats" id="sidebarStats">
        <div class="sidebar-stat-row"><span>总任务</span><span class="val" id="sidebarStatTotal">0</span></div>
        <div class="sidebar-stat-row"><span>已完成</span><span class="val" id="sidebarStatDone">0</span></div>
        <div class="sidebar-stat-row"><span>进行中</span><span class="val" id="sidebarStatProgress">0</span></div>
      </div>
      <div style="padding:0.5rem 0.75rem 0.75rem;text-align:center;">
        <button class="btn-ghost-tiny" onclick="doLogout()" title="退出登录" style="font-size:1.25rem;font-weight:bold;padding:0.5rem;">⊘</button>
      </div>
    </div>
  </div>
</div>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<!-- Main Content Area -->
<div class="app-main" id="appMain">

<!-- Header -->
<div class="header">
  <button class="header-hamburger" id="headerHamburger" title="菜单">☰</button>
  <div class="header-left">
    <span class="connection-dot loading" id="connDot" title="连接状态"></span>
    <span class="connection-text" id="connText">连接中...</span>
  </div>
  <div class="header-right">
    <button class="btn btn-primary" onclick="openAddModal()">+ 新建任务</button>
    <span class="help-icon" id="helpIcon" title="快捷键/自然语言帮助" onclick="toggleHelpTooltip(event)">?
      <span class="help-tooltip" id="helpTooltip"><kbd>N</kbd> 新建 <kbd>T</kbd> 今天 <kbd>/</kbd> 搜索<br>标题框支持自然语言：「明天买牛奶 #生活 高优先级」</span>
    </span>
  </div>
</div>

<!-- Main Content -->
<main class="main-content" id="mainContent">
  <!-- Overview View -->
  <div class="view active" id="view-overview">
    <div class="overview-header">
      <input type="text" placeholder="搜索任务..." id="overviewSearch" oninput="debouncedRenderOverview()">
      <select id="overviewFilter" aria-label="筛选状态" onchange="renderOverview()">
        <option value="all">状态</option>
        <option value="todo">待办</option>
        <option value="done">已完成</option>
      </select>
      <select id="overviewPriority" aria-label="筛选优先级" onchange="renderOverview()">
        <option value="all">优先级</option>
        <option value="high">高</option>
        <option value="medium">中</option>
        <option value="low">低</option>
      </select>
      <select id="overviewTag" aria-label="筛选标签" onchange="renderOverview()">
        <option value="all">标签</option>
      </select>
      <label class="filter-toggle" id="archiveLabel" onclick="toggleArchive()" title="点击切换显示已完成任务">
        <input type="checkbox" id="archiveToggle" onchange="renderOverview()">
        <span>归档</span>
      </label>
      <button class="btn btn-ghost btn-select" id="btnSelectMode" onclick="toggleSelectMode()">多选</button>
    </div>
    <div id="selectBar" class="select-bar" style="display:none;">
      <span class="select-count" id="selectCount">已选 0 项</span>
      <select id="bulkPriority" onchange="bulkSetPriority()">
        <option value="">优先级...</option>
        <option value="high">高</option>
        <option value="medium">中</option>
        <option value="low">低</option>
      </select>
      <button class="btn" id="bulkTagBtn" onclick="showBulkTagInput()">+ 标签</button>
      <input type="text" id="bulkTagInput" placeholder="标签，回车确认"
        style="display:none;width:8rem;outline:none;"
        onkeydown="if(event.key==='Enter')bulkAddTag()" onblur="hideBulkTagInput()">
      <button class="btn" onclick="bulkSetDate(event)" title="设置日期">📅</button>
      <button class="btn btn-danger" onclick="bulkDelete()">删除</button>
      <button class="btn btn-ghost" onclick="toggleSelectMode()">取消</button>
    </div>
    <div class="overview-stats" id="overviewStats"></div>
    <div id="overviewTableWrap"></div>
  </div>

  <!-- Today View -->
  <div class="view abs-hide" id="view-day">
    <div class="today-header">
      <div class="today-progress-ring" id="todayProgressRing">
        <div class="today-progress-inner" id="todayProgressInner">0/0</div>
      </div>
      <div>
        <div class="today-date-title" id="todayDateTitle">今天</div>
        <div class="today-date-sub" id="todayDateSub"></div>
      </div>
      <div class="today-actions">
        <button class="btn btn-ghost" id="btnGoToday" onclick="goToday()" style="display:none;">← 回到今天</button>
        <button class="btn btn-primary" onclick="openAddModal(dayViewDate)">+ 添加</button>
      </div>
    </div>
    <div class="today-list" id="todayList"></div>
  </div>

  <!-- Week / Agenda View -->
  <div class="view abs-hide" id="view-week">
    <div class="month-header">
      <h2 id="weekTitle"></h2>
      <div class="nav-btns">
        <button class="btn btn-ghost" onclick="navigateWeek(-1)">← 上周</button>
        <button class="btn btn-ghost" onclick="navigateWeek(0)">本周</button>
        <button class="btn btn-ghost" onclick="navigateWeek(1)">下周 →</button>
      </div>
    </div>
    <div class="agenda-list" id="agendaList"></div>
  </div>

  <!-- Month View -->
  <div class="view abs-hide" id="view-month">
    <div class="month-header">
      <h2 id="monthTitle"></h2>
      <div class="nav-btns">
        <button class="btn btn-ghost" onclick="navigateMonth(-1)">← 上月</button>
        <button class="btn btn-ghost" onclick="navigateMonth(0)">本月</button>
        <button class="btn btn-ghost" onclick="navigateMonth(1)">下月 →</button>
      </div>
    </div>
    <div class="month-calendar" id="monthCalendar"></div>
  </div>

  <!-- Inbox View -->
  <div class="view abs-hide" id="view-inbox">
    <div class="inbox-quick-add">
      <input type="text" id="inboxInput" placeholder="快速录入待办事项，回车保存..." onkeydown="if(event.key==='Enter')inboxQuickAdd()">
      <button class="btn btn-primary" onclick="inboxQuickAdd()">添加</button>
    </div>
    <div class="inbox-toolbar">
      <input type="text" id="inboxSearch" placeholder="搜索收件箱..." oninput="debouncedRenderInbox()">
      <select id="inboxFilter" aria-label="筛选状态" onchange="renderInbox()">
        <option value="all">全部</option>
        <option value="todo">待办</option>
        <option value="done">已完成</option>
      </select>
      <select id="inboxPriority" aria-label="筛选优先级" onchange="renderInbox()">
        <option value="all">优先级</option>
        <option value="high">高</option>
        <option value="medium">中</option>
        <option value="low">低</option>
      </select>
      <label class="filter-toggle" id="inboxArchiveLabel" onclick="toggleInboxArchive()" title="隐藏已完成任务">
        <input type="checkbox" id="inboxArchiveToggle" onchange="renderInbox()">
        <span class="filter-toggle-text">归档</span>
      </label>
    </div>
    <div class="inbox-list" id="inboxList"></div>
  </div>
</main><!-- end main-content -->
</div><!-- end .app-main -->
</div><!-- end .app-shell -->

<!-- Bottom Progress Bar (full width) -->
<div class="bottom-bar" id="bottomBar">
  <div class="progress-wrapper">
    <span style="font-size:0.875rem;">📊</span>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <span class="progress-text" id="progressText">0%</span>
    <span class="progress-detail" id="progressDetail"></span>
    <span class="progress-inbox" id="progressInbox"></span>
  </div>
</div>

<!-- Undo Bar -->
<div class="undo-bar" id="undoBar" style="display:none;">
  <span class="undo-icon">↩</span>
  <span id="undoText"></span>
  <button class="btn undo-btn" onclick="undoDelete()">撤销</button>
  <button class="btn undo-dismiss-btn" onclick="document.getElementById('undoBar').style.display='none'">✕</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <h3 id="modalTitle">新建任务</h3>
    <div class="modal-body">
    <div class="form-group">
      <label>任务标题</label>
      <input type="text" id="taskTitle" placeholder="任务标题">
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="taskDesc" placeholder="输入任务描述（可选）"></textarea>
    </div>
    <div class="form-group tag-form-group">
      <label>标签</label>
      <div class="tag-input-wrap" id="tagInputWrap" onclick="document.getElementById('tagInput').focus()">
        <input type="text" id="tagInput" placeholder="输入后回车添加" autocomplete="off">
      </div>
      <div class="tag-suggestions" id="tagSuggestions"></div>
    </div>
    <div class="form-group">
      <label>优先级</label>
      <div class="priority-btn-group">
        <button type="button" class="priority-btn" data-priority="high" onclick="setPriority('high')">高</button>
        <button type="button" class="priority-btn active" data-priority="medium" onclick="setPriority('medium')">中</button>
        <button type="button" class="priority-btn" data-priority="low" onclick="setPriority('low')">低</button>
      </div>
    </div>
    <div class="form-group">
      <label for="taskDate">日期</label>
      <div style="display:flex;gap:0.375rem;align-items:center;">
        <input type="date" id="taskDate" style="flex:1;">
        <button type="button" class="btn btn-ghost" style="padding:0.25rem 0.625rem;font-size:0.75rem;white-space:nowrap;" onclick="document.getElementById('taskDate').value=todayStr()" title="设置为今天">今天</button>
      </div>
    </div>

    <!-- Subtask Section -->
    <div class="form-group">
      <div class="subtask-section" id="subtaskSection">
        <label>📋 子任务</label>
        <div class="progress-row" id="subtaskProgress"></div>
        <div class="subtask-list" id="subtaskList"></div>
        <div class="subtask-add-row">
          <input type="text" id="subtaskInput" placeholder="输入子任务，回车添加..." onkeydown="if(event.key==='Enter')addSubtask()">
          <button class="btn btn-ghost" style="padding:0.25rem 0.625rem;font-size:0.75rem;" onclick="addSubtask()">添加</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>循环</label>
      <select id="taskRecurrenceType" aria-label="重复类型" onchange="onRecurrenceTypeChange()" style="margin-bottom:0.375rem;">
        <option value="">不循环</option>
        <option value="daily">每天</option>
        <option value="weekdays">工作日</option>
        <option value="weekly">每周</option>
      </select>
      <!-- 每周选择器 -->
      <div id="weeklyDayPicker" style="display:none;margin-bottom:0.375rem;padding-left:0.25rem;">
        <label style="font-size:0.75rem;color:#888;margin-bottom:0.25rem;display:block;">选择重复的星期</label>
        <div class="weekday-picker" id="weekdayPicker">
          <button type="button" class="wd-btn" data-day="1">一</button>
          <button type="button" class="wd-btn" data-day="2">二</button>
          <button type="button" class="wd-btn" data-day="3">三</button>
          <button type="button" class="wd-btn" data-day="4">四</button>
          <button type="button" class="wd-btn" data-day="5">五</button>
          <button type="button" class="wd-btn" data-day="6">六</button>
          <button type="button" class="wd-btn" data-day="0">日</button>
        </div>
      </div>
      <div id="recurrenceOptions" style="display:none;padding-left:0.25rem;">
        <label style="font-size:0.75rem;color:#888;margin-bottom:0.125rem;">终止条件（可选）</label>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <select id="taskRecurrenceEnd" onchange="onRecurrenceEndChange()" style="flex:1;">
            <option value="none">无限循环</option>
            <option value="count">指定次数</option>
            <option value="date">截止日期</option>
          </select>
          <input type="number" id="taskRecurrenceCount" min="1" value="5" style="display:none;width:5rem;padding:0.375rem 0.625rem;border:0.0625rem solid #d9d9d9;border-radius:0.375rem;font-size:0.8125rem;" placeholder="次数">
          <input type="date" id="taskRecurrenceDate" style="display:none;flex:1;padding:0.375rem 0.625rem;border:0.0625rem solid #d9d9d9;border-radius:0.375rem;font-size:0.8125rem;">
        </div>
      </div>
    </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" id="btnDeleteTask" style="display:none;" onclick="deleteCurrentTask()">删除</button>
      <button class="btn btn-primary" id="btnSaveTask" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script src="app.js"></script>
</body>
</html>
